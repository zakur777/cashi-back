version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: cashi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashi_db
    ports:
      - "5432:5432"
    volumes:
      - cashi-postgres-data:/var/lib/postgresql/data

volumes:
  cashi-postgres-data:
